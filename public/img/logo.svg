<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 175">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#818cf8"/>
      <stop offset="50%"  stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="gradAcc" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>

  <!-- ── LETRAS SL ─────────────────────────────────── -->
  <text x="8" y="148"
        font-family="'Arial Black', Impact, Arial, sans-serif"
        font-weight="900" font-size="148"
        fill="url(#grad)">SL</text>

  <!-- ── CORCHETES DE CÓDIGO ───────────────────────── -->
  <!-- { junto a la S -->
  <text x="6" y="42"
        font-family="'Courier New', Courier, monospace"
        font-weight="700" font-size="28"
        fill="#a5b4fc" opacity="0.9">{</text>

  <!-- } junto a la L -->
  <text x="171" y="158"
        font-family="'Courier New', Courier, monospace"
        font-weight="700" font-size="28"
        fill="#a5b4fc" opacity="0.9">}</text>

  <!-- </> en la esquina inferior -->
  <text x="118" y="172"
        font-family="'Courier New', Courier, monospace"
        font-weight="700" font-size="16"
        fill="#22d3ee" opacity="0.85">&lt;/&gt;</text>

  <!-- ── NODOS DE CIRCUITO (cuadrados) ─────────────── -->
  <rect x="78"  y="48" width="9" height="9" rx="2" fill="#22d3ee"/>
  <rect x="16"  y="82" width="9" height="9" rx="2" fill="#818cf8"/>
  <rect x="60"  y="118" width="9" height="9" rx="2" fill="#22d3ee"/>
  <rect x="103" y="68" width="7" height="7" rx="1" fill="#6366f1" opacity="0.8"/>

  <!-- ── LÍNEAS DE CIRCUITO ──────────────────────────→ -->
  <polyline points="82,48 82,28 108,28"
            stroke="#22d3ee" stroke-width="1.8"
            fill="none" opacity="0.75"/>
  <line x1="16" y1="82" x2="16" y2="58"
        stroke="#818cf8" stroke-width="1.8" opacity="0.75"/>
  <polyline points="25,86 60,86 60,118"
            stroke="#6366f1" stroke-width="1.8"
            fill="none" opacity="0.75"/>
  <line x1="69" y1="118" x2="100" y2="118"
        stroke="#22d3ee" stroke-width="1.8" opacity="0.75"/>

  <!-- punto final de línea -->
  <circle cx="108" cy="28" r="3.5" fill="#22d3ee" opacity="0.9"/>
  <circle cx="16"  cy="55" r="3"   fill="#818cf8" opacity="0.9"/>
  <circle cx="100" cy="118" r="3"  fill="#22d3ee" opacity="0.9"/>
</svg>